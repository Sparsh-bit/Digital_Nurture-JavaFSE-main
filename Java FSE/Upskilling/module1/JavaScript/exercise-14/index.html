<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jQuery Practice</title>
    <style>
        .event-card { background: #eee; padding: 20px; border: 1px solid #ccc; width: 200px; margin-top: 20px; }
    </style>
    <!-- Include jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h2>jQuery UI interactions</h2>
    <button id="toggleBtn">Toggle Event Card</button>
    
    <div id="card" class="event-card">
        <h4>Community Picnic</h4>
        <p>Sunday at 2 PM.</p>
    </div>

    <script src="main.js"></script>
</body>
</html>
