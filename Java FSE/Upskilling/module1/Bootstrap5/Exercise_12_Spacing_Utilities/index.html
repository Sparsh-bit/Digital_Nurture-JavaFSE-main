<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12: Spacing Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .box { background-color: #e9ecef; border: 1px solid #ced4da; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Exercise 12.1: Margin and Padding</h3>
        <div class="box m-3 p-2">
            Box with <code>m-3</code> (margin all sides 3) and <code>p-2</code> (padding all sides 2)
        </div>
        <div class="box mt-4 py-5">
            Box with <code>mt-4</code> (margin top 4) and <code>py-5</code> (padding top and bottom 5)
        </div>

        <h3 class="mt-5 mb-4">Exercise 12.2: Pricing Section Layout</h3>
        <div class="row text-center px-4">
            <div class="col-md-4 mb-4">
                <div class="card p-4 shadow-sm">
                    <h4 class="my-0 fw-normal">Free</h4>
                    <h1 class="card-title mt-3 mb-4">$0<small class="text-muted fw-light">/mo</small></h1>
                    <button class="btn btn-lg btn-outline-primary w-100">Sign up for free</button>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card p-4 shadow-sm border-primary">
                    <h4 class="my-0 fw-normal text-primary">Pro</h4>
                    <h1 class="card-title mt-3 mb-4">$15<small class="text-muted fw-light">/mo</small></h1>
                    <button class="btn btn-lg btn-primary w-100">Get started</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
