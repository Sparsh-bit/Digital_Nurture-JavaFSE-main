<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 15: Borders, Shadows, and Rounded Corners</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5 text-center">
        <h3>Exercise 15.1: Border Utilities on Image</h3>
        <img src="https://via.placeholder.com/150" alt="Placeholder" 
             class="border border-primary border-3 rounded-circle mb-5">

        <h3>Exercise 15.2: Shadow and Rounded-Pill in Card</h3>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg p-4 rounded-4 border-0 mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Heavy Shadow Card</h5>
                        <p class="card-text">This card uses <code>shadow-lg</code> for a deep shadow and removes default borders.</p>
                        
                        <!-- Using rounded-pill -->
                        <button class="btn btn-primary rounded-pill px-4">Rounded Pill Button</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
