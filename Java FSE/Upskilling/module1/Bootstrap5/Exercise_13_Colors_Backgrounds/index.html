<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 13: Colors and Backgrounds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Dashboard Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 text-white">Dashboard</span>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>Exercise 13.1: Contextual Backgrounds</h3>
        <div class="row mb-4 text-white text-center">
            <div class="col-md-3 mb-2">
                <div class="p-4 bg-primary rounded">Primary Metric</div>
            </div>
            <div class="col-md-3 mb-2">
                <div class="p-4 bg-success rounded">Success Alert</div>
            </div>
            <div class="col-md-3 mb-2">
                <div class="p-4 bg-warning text-dark rounded">Warning Info</div>
            </div>
            <div class="col-md-3 mb-2">
                <div class="p-4 bg-danger rounded">Critical Error</div>
            </div>
        </div>

        <h3>Exercise 13.2: Gradient Background</h3>
        <div class="p-5 bg-dark bg-gradient text-white rounded">
            <h2>Gradient Hero Section</h2>
            <p>This box uses <code>bg-dark</code> combined with <code>bg-gradient</code> and <code>text-white</code> for a subtle gradient effect.</p>
        </div>
    </div>
</body>
</html>
