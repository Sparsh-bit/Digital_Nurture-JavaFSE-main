<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5: Alignment and Reordering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .row-tall { min-height: 200px; background-color: #f1f3f5; border: 1px dashed #adb5bd; }
        .box { padding: 20px; background-color: #0d6efd; color: white; border-radius: 5px; margin: 5px; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h3>Exercise 5.1: Alignment</h3>
        <!-- Center content horizontally and vertically -->
        <div class="row row-tall justify-content-center align-items-center mb-5">
            <div class="col-auto box">Centered Item 1</div>
            <div class="col-auto box">Centered Item 2</div>
        </div>

        <h3>Exercise 5.2: Reordering</h3>
        <div class="row">
            <!-- Box 1 becomes second on medium screens -->
            <div class="col-12 col-md-6 order-md-2 box bg-success">Box 1 (order-md-2)</div>
            <!-- Box 2 becomes first on medium screens -->
            <div class="col-12 col-md-6 order-md-1 box bg-danger">Box 2 (order-md-1)</div>
        </div>
    </div>
</body>
</html>
