<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6: Responsive Flexbox Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .custom-nav { background-color: #343a40; color: white; padding: 10px; }
        .custom-nav a { color: white; padding: 10px; text-decoration: none; }
        .custom-nav a:hover { background-color: #495057; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h3>Exercise 6.1 (7.1): Navbar with Flex Utilities</h3>
        <nav class="custom-nav d-flex flex-column flex-md-row mb-5">
            <a href="#" class="p-2">Home</a>
            <a href="#" class="p-2">Features</a>
            <a href="#" class="p-2">Pricing</a>
            <a href="#" class="p-2 ms-md-auto">Login</a>
        </nav>

        <h3>Exercise 6.2 (7.2): Card Layout with Flex Utilities</h3>
        <div class="card" style="width: 100%;">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="card-title mb-0">Product Title</h5>
                    <p class="text-muted mb-0">Short description goes here</p>
                </div>
                <button class="btn btn-primary">Buy Now - $99</button>
            </div>
        </div>
    </div>
</body>
</html>
