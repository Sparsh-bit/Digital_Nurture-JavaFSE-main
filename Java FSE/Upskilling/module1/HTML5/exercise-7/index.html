<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Invite</title>
    <style>
        body { font-family: Arial; padding: 30px; text-align: center; background-color: #222; color: white; }
        #statusMsg { color: #00ff00; margin-top: 10px; font-weight: bold; }
        video { max-width: 100%; border: 4px solid #444; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Community Event Promo Video</h2>
    
    <!-- Using a placeholder video from an open source test URL -->
    <video id="promoVideo" width="600" controls oncanplay="videoReady()">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support HTML video.
    </video>
    
    <p id="statusMsg">Loading video...</p>

    <form style="margin-top: 50px; background: #333; padding: 20px; display: inline-block; text-align: left;">
        <h3>Event RSVP</h3>
        <p>Start filling this out to trigger the unload warning.</p>
        <input type="text" id="rsvpName" placeholder="Your Name" oninput="markDirty()">
        <br><br>
        <a href="https://google.com" style="color: #add8e6;">Click here to leave the page!</a>
    </form>

    <script>
        function videoReady() {
            document.getElementById('statusMsg').innerText = "Video ready to play!";
        }

        // Handle beforeunload warning
        let isDirty = false;
        
        function markDirty() {
            isDirty = true;
        }

        window.onbeforeunload = function(e) {
            if (isDirty) {
                // Most modern browsers ignore custom text and just show a generic warning
                return "You have unsaved changes! Are you sure you want to leave?"; 
            }
        };
    </script>
</body>
</html>
