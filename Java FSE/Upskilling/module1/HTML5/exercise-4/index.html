<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Image Gallery</title>
    <style>
        table {
            border-collapse: collapse;
            margin: 20px auto;
        }
        td {
            padding: 10px;
            text-align: center;
        }
        .gallery-img {
            border: 4px solid #333;
            border-radius: 8px;
            width: 250px;
            height: 150px;
            object-fit: cover;
        }
        .caption {
            font-style: italic;
            color: #555;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h2 style="text-align: center;">Past Community Events</h2>
    
    <table>
        <tr>
            <td>
                <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?w=300" alt="Block Party" title="Summer Block Party 2023" class="gallery-img">
                <div class="caption">Summer Block Party</div>
            </td>
            <td>
                <img src="https://images.unsplash.com/photo-1531058020387-3be344556be6?w=300" alt="Music Festival" title="Local Music Fest" class="gallery-img">
                <div class="caption">Local Music Fest</div>
            </td>
            <td>
                <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?w=300" alt="Farmers Market" title="Sunday Farmers Market" class="gallery-img">
                <div class="caption">Sunday Farmers Market</div>
            </td>
        </tr>
        <tr>
            <td>
                <img src="https://images.unsplash.com/photo-1523580494112-071dcb849377?w=300" alt="Charity Run" title="5K Charity Run" class="gallery-img">
                <div class="caption">5K Charity Run</div>
            </td>
            <td>
                <img src="https://images.unsplash.com/photo-1491438590914-bc09fcaaf77a?w=300" alt="Art Walk" title="Downtown Art Walk" class="gallery-img">
                <div class="caption">Downtown Art Walk</div>
            </td>
            <td>
                <img src="https://images.unsplash.com/photo-1517457373958-b7bdd4587205?w=300" alt="Town Hall" title="Town Hall Meeting" class="gallery-img">
                <div class="caption">Town Hall Meeting</div>
            </td>
        </tr>
    </table>
</body>
</html>
