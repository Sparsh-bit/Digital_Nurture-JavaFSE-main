<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Upcoming Events</h2>
    
    <div class="eventCard">
        <h3>Music Festival</h3>
        <p>Live bands all weekend.</p>
    </div>

    <div class="eventCard hidden-card">
        <h3>Secret Event</h3>
        <p>This uses visibility: hidden.</p>
    </div>

    <div class="eventCard display-none-card">
        <h3>Cancelled Event</h3>
        <p>This uses display: none.</p>
    </div>

    <div class="eventCard">
        <h3>Food Truck Fiesta</h3>
        <p>Over 20 food trucks!</p>
    </div>

    <form class="event-form">
        <label>Newsletter Sign-up:</label>
        <input type="email" class="highlight-input" placeholder="Enter email...">
    </form>
</body>
</html>
