<!DOCTYPE html>
<html lang="en">
<head>

    <title>Table Styling</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Admin Event Roster</h2>

        <thead>
            <tr>
                <th>Event Name</th>
                <th>Date</th>
                <th>Location</th>
                <th>Status</th>
            </tr>

        <tbody>
            <tr>
                <td>Summer BBQ</td>
                <td>July 15</td>
                <td>Central Park</td>
                <td>Approved</td>
            </tr>
            <tr>
                <td>Tech Meetup</td>
                <td>Aug 2</td>
                <td>Library</td>
                <td>Pending</td>
            </tr>
            <tr>
                <td>Charity Run</td>
                <td>Aug 10</td>
                <td>Main St.</td>
                <td>Approved</td>
            </tr>
            <tr>
                <td>Bake Sale</td>
                <td>Sept 5</td>
                <td>Town Hall</td>
                <td>Rejected</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
