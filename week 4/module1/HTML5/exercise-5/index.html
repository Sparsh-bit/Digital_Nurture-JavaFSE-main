<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 8px; max-width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .success-msg { color: green; font-weight: bold; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Register for an Event</h2>
        <!-- Using onsubmit to prevent default reload and just show the output -->
        <form onsubmit="event.preventDefault(); document.getElementById('result').value = 'Thanks ' + document.getElementById('name').value + '! Your registration was submitted.';">
            
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="e.g. John Doe" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="date">Event Date:</label>
                <input type="date" id="date" name="date" required>
            </div>
            
            <div class="form-group">
                <label for="type">Event Type:</label>
                <select id="type" name="type" required>
                    <option value="">--Select an event--</option>
                    <option value="music">Music Festival</option>
                    <option value="market">Farmers Market</option>
                    <option value="townhall">Town Hall Meeting</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Additional Message:</label>
                <textarea id="message" name="message" rows="3" placeholder="Any special requirements?"></textarea>
            </div>
            
            <button type="submit">Submit Registration</button>
            <output id="result" class="success-msg"></output>
            
        </form>
    </div>
</body>
</html>
