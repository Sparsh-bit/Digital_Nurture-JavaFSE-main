<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner {
            background-color: #007BFF;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin: 20px;
        }
        
        .highlight {
            background-color: yellow;
            color: black;
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        <h2>Welcome back, Resident!</h2>
        <p>We are glad to see you again.</p>
        <p>Don't miss our <span style="color: red; font-weight: bold;">SPECIAL SUMMER OFFER</span> on community pool passes!</p>
    </div>

    <div style="padding: 20px;">
        <p>This is a normal paragraph.</p>
        <p class="highlight">This paragraph has the highlight class applied to it for visual emphasis.</p>
    </div>
</body>
</html>
