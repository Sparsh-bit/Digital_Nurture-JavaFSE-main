<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Feedback</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; }
        .box { border: 1px solid #ccc; padding: 20px; max-width: 400px; margin-bottom: 20px; }
        .error { color: red; font-size: 0.9em; display: none; }
        img { width: 200px; transition: transform 0.3s; cursor: pointer; }
        .enlarged { transform: scale(1.5); }
    </style>
</head>
<body>
    <h2>Live Event Feedback</h2>

    <div class="box">
        <label>Phone Number (blur event):</label><br>
        <input type="text" id="phone" placeholder="123-456-7890" onblur="validatePhone()">
        <div id="phoneError" class="error">Please enter a valid 10-digit number.</div>
    </div>

    <div class="box">
        <label>Select Event (change event):</label><br>
        <select id="eventSelect" onchange="showFee()">
            <option value="0">Free Community Walk</option>
            <option value="15">Local Concert ($15)</option>
            <option value="50">Gala Dinner ($50)</option>
        </select>
        <p id="feeDisplay">Fee: $0</p>
    </div>

    <div class="box">
        <label>Feedback (keyboard event):</label><br>
        <textarea id="feedback" rows="4" style="width: 100%;" onkeyup="countChars()"></textarea>
        <small>Characters: <span id="charCount">0</span></small>
    </div>

    <div class="box">
        <button onclick="submitFeedback()">Submit (click event)</button>
        <p id="submitConfirm" style="color: green; display: none;">Feedback submitted successfully!</p>
    </div>

    <div class="box">
        <p>Double-click the image to enlarge (dblclick event):</p>
        <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?w=200" id="promoImg" ondblclick="toggleImage()">
    </div>

    <script>
        function validatePhone() {
            const phone = document.getElementById('phone').value;
            const error = document.getElementById('phoneError');
            // simple check just for length in this exercise
            if(phone.length < 10 && phone.length > 0) {
                error.style.display = 'block';
            } else {
                error.style.display = 'none';
            }
        }

        function showFee() {
            const val = document.getElementById('eventSelect').value;
            document.getElementById('feeDisplay').innerText = 'Fee: $' + val;
        }

        function countChars() {
            const count = document.getElementById('feedback').value.length;
            document.getElementById('charCount').innerText = count;
        }

        function submitFeedback() {
            document.getElementById('submitConfirm').style.display = 'block';
        }

        function toggleImage() {
            document.getElementById('promoImg').classList.toggle('enlarged');
        }
    </script>
</body>
</html>
