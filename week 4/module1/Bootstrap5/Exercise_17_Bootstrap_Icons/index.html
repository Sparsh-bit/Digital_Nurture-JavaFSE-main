<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 17: Icons with Bootstrap Icons</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons CSS via CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .icon-btn { font-size: 1.5rem; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <div class="container mt-5 flex-grow-1">
        <h3>Exercise 17.2: Icon-only Buttons</h3>
        <p>Replace text buttons with icon-only buttons.</p>
        
        <div class="d-flex gap-2 mb-4">
            <!-- Edit Button -->
            <button class="btn btn-outline-primary icon-btn" aria-label="Edit" title="Edit">
                <i class="bi bi-pencil-square"></i>
            </button>
            <!-- Delete Button -->
            <button class="btn btn-outline-danger icon-btn" aria-label="Delete" title="Delete">
                <i class="bi bi-trash3-fill"></i>
            </button>
            <!-- Settings Button -->
            <button class="btn btn-outline-secondary icon-btn" aria-label="Settings" title="Settings">
                <i class="bi bi-gear-fill"></i>
            </button>
        </div>
    </div>

    <!-- Exercise 17.1: Social Media Icons in Footer -->
    <footer class="bg-dark text-white text-center py-4">
        <p class="mb-2">Follow us on social media</p>
        <div class="d-flex justify-content-center gap-3">
            <a href="#" class="text-white fs-4"><i class="bi bi-twitter"></i></a>
            <a href="#" class="text-white fs-4"><i class="bi bi-facebook"></i></a>
            <a href="#" class="text-white fs-4"><i class="bi bi-instagram"></i></a>
            <a href="#" class="text-white fs-4"><i class="bi bi-linkedin"></i></a>
        </div>
    </footer>
</body>
</html>
