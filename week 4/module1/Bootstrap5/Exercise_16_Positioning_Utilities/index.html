<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 16: Positioning Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h3>Exercise 16.2: Position Relative/Absolute</h3>
        
        <!-- Image with Badge Overlay -->
        <div class="position-relative d-inline-block">
            <img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=300" class="rounded" alt="Background">
            <!-- Badge overlaying top right corner -->
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                99+
                <span class="visually-hidden">unread messages</span>
            </span>
        </div>
        
        <br><br><br><br><br><br><br><br><br><br><br>
        <p>Scroll down to see the fixed footer!</p>
    </div>

    <!-- Exercise 16.1: Fixed Footer -->
    <footer class="position-fixed bottom-0 w-100 bg-dark text-white text-center py-3">
        Fixed Footer using <code>position-fixed bottom-0</code>
    </footer>
</body>
</html>
